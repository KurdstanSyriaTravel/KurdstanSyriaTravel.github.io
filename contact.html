<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اتصل بنا - Kurdistan Syria Travel</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #27ae60;
            --text-color: #333;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            line-height: 1.6; 
            color: var(--text-color);
            background-color: #f9f9f9;
            margin: 0;
            padding: 20px;
        }
        .container { 
            max-width: 800px; 
            margin: 40px auto; 
            background: #fff; 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 { color: var(--primary-color); border-bottom: 2px solid var(--accent-color); padding-bottom: 10px; display: inline-block; }
        p { font-size: 1.1em; color: #555; margin: 20px 0; }
        .contact-methods { margin-top: 30px; display: grid; gap: 20px; }
        .method-card {
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            transition: transform 0.3s;
        }
        .method-card:hover { transform: translateY(-5px); border-color: var(--accent-color); }
        .email-link { 
            display: block;
            font-size: 1.3em; 
            font-weight: bold; 
            color: var(--accent-color); 
            text-decoration: none;
            word-break: break-all;
        }
        .social-note { font-size: 0.9em; color: #888; margin-top: 30px; }
        .back-home {
            display: inline-block;
            margin-top: 30px;
            padding: 10px 25px;
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .back-home:hover { background-color: #1a252f; }
    </style>
</head>
<body>

    <div class="container">
        <h1>اتصل بنا</h1>
        <p>مرحباً بك في موقع <strong>Kurdistan Syria Travel</strong>. نحن هنا للإجابة على استفساراتك حول السياحة والمعالم في كردستان وسوريا.</p>
        
        <div class="contact-methods">
            <div class="method-card">
                <h3>البريد الإلكتروني الرسمي</h3>
                <a href="mailto:mohammad.kurdi.pro@gmail.com" class="email-link">mohammad.kurdi.pro@gmail.com</a>
            </div>
        </div>

        <p class="social-note">
            يمكنك أيضاً التواصل معنا عبر منصات التواصل الاجتماعي المذكورة في الصفحة الرئيسية للموقع.
        </p>

        <a href="index.html" class="back-home">العودة إلى الصفحة الرئيسية</a>
    </div>

</body>
</html>
