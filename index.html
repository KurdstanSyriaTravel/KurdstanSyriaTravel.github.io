<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قناة السياحة في كردستان وسوريا</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background-color: #f0f2f5; color: #333; text-align: center; }
        .header-image { width: 100%; max-height: 400px; object-fit: cover; border-bottom: 5px solid #28a745; }
        .container { padding: 20px; max-width: 900px; margin: auto; background: white; box-shadow: 0 0 10px rgba(0,0,0,0.1); border-radius: 10px; padding-bottom: 40px; }
        h1 { color: #0056b3; margin-bottom: 30px; }
        
        /* قسم الأعلام - تصحيح وتكبير وتأثير واقعي */
        .flags-section { display: flex; justify-content: center; gap: 50px; margin: 40px 0; flex-wrap: wrap; align-items: center; }
        
        .flag-wrapper { 
            width: 280px; /* حجم كبير جداً وواضح */
            height: auto;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3)); /* ظل ليعطي عمق */
            position: relative;
        }

        .flag-img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 4px; /* زوايا منحنية قليلاً */
        }
        
        /* كود حركة الرفرفة الواقعية والبطيئة */
        .wave-effect {
            animation: realisticWave 5s ease-in-out infinite;
            transform-origin: left center;
        }
        
        /* تأخير بسيط لعلم كردستان لتبدو الحركة طبيعية */
        .kurdistan-delay { animation-delay: 2.5s; }

        @keyframes realisticWave {
            0%, 100% { transform: scaleY(1) skewY(0deg) rotate(0deg); }
            20% { transform: scaleY(1.02) skewY(1deg) rotate(0.5deg); }
            50% { transform: scaleY(1.05) skewY(2deg) rotate(-0.5deg); }
            80% { transform: scaleY(1.02) skewY(1deg) rotate(0.5deg); }
        }

        .btn-yt { display: inline-block; background: #ff0000; color: white; padding: 15px 35px; text-decoration: none; border-radius: 8px; font-weight: bold; font-size: 1.3rem; transition: 0.3s; margin-top: 30px; }
        .btn-yt:hover { background: #cc0000; transform: scale(1.05); }
    </style>
</head>
<body>

    <img src="images/cover.jpg" alt="كردستان وسوريا للسياحة" class="header-image">

    <div class="container">
        <h1>أهلاً بكم في موقعنا السياحي</h1>

        <div class="flags-section">
            <div class="flag-wrapper wave-effect">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Flag_of_Syria.svg" alt="علم سوريا الحقيقي" class="flag-img">
            </div>

            <div class="flag-wrapper wave-effect kurdistan-delay">
                <img src="https://upload.wikimedia.org/wikipedia/commons/d/d3/Flag_of_Kurdistan.svg" alt="علم كردستان الحقيقي" class="flag-img">
            </div>
        </div>

        <p style="font-size: 1.3rem; line-height: 1.8; max-width: 700px; margin: auto;">
            استكشف أجمل المناطق الطبيعية والمعالم السياحية في كردستان وسوريا.
        </p>
        <hr style="margin: 30px auto; width: 50%;">
        <a href="https://youtube.com/@syriatour" class="btn-yt">تابعنا على يوتيوب</a>
    </div>

</body>
</html>
