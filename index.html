<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kurdistan Syria Travel</title>
    <style>
        :root { --gold: #d4af37; --dark-blue: #002147; --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; text-align: center; }

        .header-king {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%; background: var(--white);
            border-bottom: 3px solid var(--gold);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .flag-container { width: 90px; height: 60px; }

        .tools-section { margin: 30px auto; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .search-wrapper { display: flex; gap: 10px; }
        .search-input { padding: 10px 20px; border: 1px solid #ccc; border-radius: 25px; width: 220px; outline: none; }
        .search-btn { background: var(--dark-blue); color: #fff; border: none; padding: 10px 25px; border-radius: 25px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<header class="header-king">
    <div class="flag-container">
        <svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
            <rect width="600" height="133.3" fill="#ED2024"/>
            <rect y="133.3" width="600" height="133.3" fill="#FFFFFF"/>
            <rect y="266.6" width="600" height="133.3" fill="#278E43"/>
            <g transform="translate(300 200)">
                <circle r="46" fill="#FEB117"/>
                <g id="rays" fill="#FEB117">
                    <path d="M0-95L11-46H-11z"/><path d="M0-95L11-46H-11z" transform="rotate(17.14)"/><path d="M0-95L11-46H-11z" transform="rotate(34.28)"/><path d="M0-95L11-46H-11z" transform="rotate(51.42)"/><path d="M0-95L11-46H-11z" transform="rotate(68.57)"/><path d="M0-95L11-46H-11z" transform="rotate(85.71)"/><path d="M0-95L11-46H-11z" transform="rotate(102.85)"/><path d="M0-95L11-46H-11z" transform="rotate(119.99)"/><path d="M0-95L11-46H-11z" transform="rotate(137.14)"/><path d="M0-95L11-46H-11z" transform="rotate(154.28)"/><path d="M0-95L11-46H-11z" transform="rotate(171.42)"/><path d="M0-95L11-46H-11z" transform="rotate(188.56)"/><path d="M0-95L11-46H-11z" transform="rotate(205.7)"/><path d="M0-95L11-46H-11z" transform="rotate(222.85)"/><path d="M0-95L11-46H-11z" transform="rotate(239.99)"/><path d="M0-95L11-46H-11z" transform="rotate(257.13)"/><path d="M0-95L11-46H-11z" transform="rotate(274.28)"/><path d="M0-95L11-46H-11z" transform="rotate(291.42)"/><path d="M0-95L11-46H-11z" transform="rotate(308.56)"/><path d="M0-95L11-46H-11z" transform="rotate(325.7)"/><path d="M0-95L11-46H-11z" transform="rotate(342.85)"/>
                </g>
            </g>
        </svg>
    </div>

    <div class="header-title">
        <h1 style="color: var(--dark-blue); font-size: 1.4rem;">Kurdistan Syria Travel</h1>
        <p style="color: #28a745; font-weight: bold; font-size: 0.85rem;">مرشد محلي Level 9</p>
    </div>

    <div class="flag-container">
        <svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
            <rect width="600" height="133.3" fill="#007A3D"/><rect y="133.3" width="600" height="133.3" fill="#FFFFFF"/><rect y="266.6" width="600" height="133.3" fill="#000000"/>
            <g fill="#CE1126">
                <path id="s" d="M0-35L9-11H34L14 5L21 30L0 15L-21 30L-14 5L-34-11H-9Z" transform="translate(150 200) scale(0.7)"/><use href="#s" transform="translate(150 0)"/><use href="#s" transform="translate(300 0)"/>
            </g>
        </svg>
    </div>
</header>

<div class="tools-section">
    <div class="search-wrapper">
        <input type="text" class="search-input" placeholder="ابحث هنا...">
        <button class="search-btn">بحث</button>
    </div>

</div>

<script>
    function googleTranslateElementInit() { new google.translate.TranslateElement({pageLanguage: 'ar'}, 'google_translate_element'); }
</script>

</html>
