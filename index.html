<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kurdistan Syria Travel | Official Correct Flags</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7931800633354489" crossorigin="anonymous"></script>

    <style>
        :root { --gold: #d4af37; --dark-blue: #002147; --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f9f9f9; text-align: center; }

        /* الهيدر الأبيض الملكي لتوسيط العناصر */
        .ultra-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%; background: var(--white);
            border-bottom: 3px solid var(--gold);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .header-center h1 { font-size: 1.6rem; color: var(--dark-blue); font-weight: 800; }
        .header-center p { font-size: 0.9rem; color: #28a745; font-weight: bold; }

        /* الأعلام HD المصححة */
        .flag-box { width: 90px; height: 60px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15)); }

        /* شريط الأدوات */
        .tools-bar { 
            display: flex; justify-content: center; gap: 15px; align-items: center; 
            margin: 25px 0; padding: 0 5%;
        }
        .search-ultra { 
            background: #fff; border: 1px solid #ccc; border-radius: 20px; 
            padding: 8px 18px; width: 250px; outline: none; transition: 0.3s;
        }
        .btn-search { 
            background: #002147; color: #fff; border: none; border-radius: 20px; 
            padding: 8px 25px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-search:hover { background-color: var(--gold); }

        #google_translate_element { margin-top: 15px; }
    </style>
</head>
<body>

<header class="ultra-header">
    <div class="flag-box">
        <svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
            <rect width="600" height="133.3" fill="#ED2024"/><rect y="133.3" width="600" height="133.3" fill="#FFFFFF"/><rect y="266.6" width="600" height="133.3" fill="#278E43"/>
            <g transform="translate(300 200)">
                <circle r="46" fill="#FEB117"/>
                <path id="ray" d="M 0 -95 L 11 -46 L -11 -46 Z" fill="#FEB117"/>
                <script>
                    for(let i=1; i<21; i++) {
                        document.write(`<use href="#ray" transform="rotate(${i * (360/21)})"/>`);
                    }
                </script>
            </g>
        </svg>
    </div>

    <div class="header-center">
        <h1>Kurdistan Syria Travel</h1>
        <p>مرشد محلي Level 9 | 2026</p>
    </div>

    <div class="flag-box">
        <svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
            <rect width="600" height="133.3" fill="#007A3D"/><rect y="133.3" width="600" height="133.3" fill="#FFFFFF"/><rect y="266.6" width="600" height="133.3" fill="#000000"/>
            <g fill="#CE1126">
                <path id="s" d="M 0 -35 L 9 -11 H 34 L 14 5 L 21 30 L 0 15 L -21 30 L -14 5 L -34 -11 H -9 Z" transform="translate(150 200) scale(0.8)"/>
                <use href="#s" transform="translate(150 0)"/><use href="#s" transform="translate(300 0)"/>
            </g>
        </svg>
    </div>
</header>

<div class="tools-bar">
    <input type="text" class="search-ultra" placeholder="ابحث عن وجهتك...">
    <button class="btn-search">بحث</button>
</div>

<div id="google_translate_element"></div>

<script>
    function googleTranslateElementInit() { new google.translate.TranslateElement({pageLanguage: 'ar'}, 'google_translate_element'); }
</script>
<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
