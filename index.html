<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قناة السياحة في كردستان وسوريا</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background-color: #f0f2f5; color: #333; text-align: center; }
        .header-image { width: 100%; max-height: 400px; object-fit: cover; border-bottom: 5px solid #28a745; }
        .container { padding: 20px; max-width: 900px; margin: auto; background: white; box-shadow: 0 0 10px rgba(0,0,0,0.1); min-height: 300px; }
        h1 { color: #0056b3; }
        p { font-size: 1.2rem; line-height: 1.6; }
        .footer-link { display: inline-block; margin-top: 20px; padding: 10px 20px; background: #ff0000; color: white; text-decoration: none; border-radius: 5px; }
        
        /* قسم الأعلام المتحركة */
        .flag-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px 0;
            position: relative;
            height: 100px; /* Adjust height as needed */
        }

        .flag {
            position: absolute;
            max-width: 150px; /* Adjust width as needed */
            opacity: 0; /* Initially hidden */
            animation: flagAnimation 6s linear infinite; /* Animation configuration */
        }

        .flag.syria {
            left: 50%;
            transform: translateX(-50%);
            animation-delay: 0s; /* No delay for Syria */
        }

        .flag.kurdistan {
            left: 50%;
            transform: translateX(-50%);
            animation-delay: 3s; /* Delay for Kurdistan for alternating effect */
        }

        /* تعريف حركة الأعلام */
        @keyframes flagAnimation {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            5% { opacity: 1; transform: translateX(-50%) translateY(0); }
            45% { opacity: 1; transform: translateX(-50%) translateY(0); }
            50% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            100% { opacity: 0; transform: translateX(-50%) translateY(20px); }
        }
    </style>
</head>
<body>

    <img src="images/cover.jpg" alt="كردستان وسوريا للسياحة" class="header-image">

    <div class="container">
        <h1>أهلاً بكم في موقعنا السياحي</h1>
        
        <div class="flag-container">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Flag_of_Syria.svg" alt="علم سوريا" class="flag syria">
            <img src="https://upload.wikimedia.org/wikipedia/commons/d/d3/Flag_of_Kurdistan.svg" alt="علم كردستان" class="flag kurdistan">
        </div>
        
        <p>استكشف أجمل المناطق الطبيعية والمعالم السياحية في كردستان وسوريا.</p>
        <hr>
        <p>الموقع قيد التطوير لإضافة المزيد من التفاصيل قريباً.</p>
        
        <a href="https://youtube.com/@syriatour" class="footer-link" target="_blank">تابعنا على يوتيوب</a>
    </div>

</body>
</html>
