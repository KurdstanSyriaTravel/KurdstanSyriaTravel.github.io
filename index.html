<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kurdistan Syria Travel</title>
    
    <style>
        :root { --gold: #d4af37; --dark: #1a1a1a; --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f4f4; color: #333; }

        /* الهيدر المحترف */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 5%; background: var(--white); border-bottom: 3px solid var(--gold);
            position: sticky; top: 0; z-index: 1000;
        }
        .flag { width: 60px; height: auto; border-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .title-area { text-align: center; }
        .title-area h1 { font-size: 1.2rem; color: #002147; }
        .title-area p { font-size: 0.75rem; color: #28a745; font-weight: bold; }

        /* شريط البحث والترجمة */
        .tools-bar { 
            display: flex; justify-content: center; gap: 10px; padding: 15px; 
            background: #fff; border-bottom: 1px solid #ddd; flex-wrap: wrap;
        }
        .search-box { padding: 8px 15px; border: 1px solid #ccc; border-radius: 20px; width: 200px; }
        .btn-search { background: #002147; color: #fff; border: none; padding: 8px 20px; border-radius: 20px; cursor: pointer; }

        /* الفيديو والمعرض */
        .video-container { width: 100%; height: 250px; background: #000; }
        .video-container video { width: 100%; height: 100%; object-fit: cover; }

        .content { padding: 20px 5%; max-width: 900px; margin: auto; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-top: 20px; }
        .gallery img { 
            width: 100%; height: 120px; object-fit: cover; border-radius: 10px; 
            border: 2px solid var(--gold); transition: 0.3s; 
        }

        /* أيقونات التواصل الاجتماعي (تصميم التطبيقات) */
        .social-box { 
            background: #fff; padding: 30px 10px; text-align: center; margin-top: 20px;
            border-top: 1px solid #eee;
        }
        .social-grid { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .app-icon { 
            width: 55px; height: 55px; border-radius: 12px; display: flex; 
            align-items: center; justify-content: center; text-decoration: none; 
            color: #fff; font-weight: bold; font-size: 1.4rem; transition: 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .facebook { background: #1877F2; }
        .whatsapp { background: #25D366; }
        .instagram { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
        .youtube { background: #FF0000; }
        .tiktok { background: #000; }

        footer { background: var(--dark); color: #999; padding: 30px; text-align: center; font-size: 0.85rem; }
        footer a { color: var(--gold); text-decoration: none; }
    </style>
</head>
<body>

    <header>
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Flag_of_Syria.svg" class="flag" alt="Syria">
        <div class="title-area">
            <h1>Kurdistan Syria Travel</h1>
            <p>مرشد محلي معتمد Level 9</p>
        </div>
        <img src="https://upload.wikimedia.org/wikipedia/commons/3/35/Flag_of_Kurdistan.svg" class="flag" alt="Kurdistan">
    </header>

    <div class="tools-bar">
        <input type="text" class="search-box" placeholder="ابحث هنا...">
        <button class="btn-search">بحث</button>
        <div id="google_translate_element"></div>
    </div>

    <div class="video-container">
        <video autoplay muted loop playsinline>
            <source src="images/hero.mp4" type="video/mp4">
        </video>
    </div>

    <div class="content">
        <h2 style="text-align:center; margin-bottom:15px; color:#002147;">اكتشف جمال سوريا</h2>
        <p style="text-align:justify; font-size: 0.95rem;">من دمشق التاريخية إلى القدموس واللاذقية الساحرة، نأخذكم في جولة لا تُنسى لاستكشاف الطبيعة والتراث.</p>
        
        <div class="gallery">
            <script>
                for(let i=1; i<=7; i++){
                    let n = i < 10 ? '0'+i : i;
                    document.write(`<img src="images/${n}.jpg" alt="Photo ${n}">`);
                }
            </script>
        </div>
    </div>

    <div class="social-box">
        <h3 style="margin-bottom:20px;">تواصل معنا</h3>
        <div class="social-grid">
            <a href="https://facebook.com/share/18KAS7cXh4/" class="app-icon facebook">f</a>
            <a href="https://wa.me/9647502061184" class="app-icon whatsapp">💬</a>
            <a href="https://instagram.com/tourism_video" class="app-icon instagram">📸</a>
            <a href="https://youtube.com/@syriatourism1980" class="app-icon youtube">▶</a>
            <a href="https://www.tiktok.com/@moradalamdar1239" class="app-icon tiktok">♪</a>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Kurdistan Syria Travel</p>
        <p>بواسطة: محمد عثمان كردي</p>
        <p><a href="mailto:moradlmdr@gmail.com">moradlmdr@gmail.com</a></p>
    </footer>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'ar'}, 'google_translate_element');
        }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
