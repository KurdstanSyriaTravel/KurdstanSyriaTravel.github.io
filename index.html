<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kurdstan Syria Travel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; animation: none !important; transition: none !important; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #fff; text-align: center; color: #333; overflow-x: hidden; }       
        
        .hero-wrapper { position: relative; height: 100vh; width: 100%; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #000; }
        #hero-video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        .hero-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.1); z-index: 2; }
        .hero-text-content { position: relative; z-index: 3; color: white; }

        .identity-row { display: flex; justify-content: center; align-items: center; padding: 10px 0; gap: 20px; background: #fff; border: none; }
        .platform-title { color: #004a99; font-size: 1.1rem; font-weight: bold; line-height: 1.2; }
        
        .flag-box { width: 90px; height: 60px; border-radius: 4px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .flag-box svg { width: 100%; height: 100%; display: block; }

        .nav-links { padding: 10px 0; background: #fff; }
        .nav-btn { text-decoration: none; background: #28a745; color: white; padding: 10px 30px; border-radius: 25px; font-weight: bold; display: inline-block; }
        
        .ticker { background: #28a745; color: white; padding: 10px 0; overflow: hidden; white-space: nowrap; }
        .t-text { display: inline-block; animation: s-right 25s linear infinite !important; font-size: 0.9rem; }
        @keyframes s-right { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .container { width: 100%; padding: 0; }
        .card { width: 100%; position: relative; background: #fff; margin-bottom: 5px; }
        .card img { width: 100%; height: auto; display: block; filter: brightness(100%) !important; opacity: 1 !important; }
        .card-info { position: absolute; bottom: 20px; width: 100%; text-align: center; color: #fff; text-shadow: 2px 2px 10px rgba(0,0,0,0.9); }
        .card-info h3 { font-size: 1.4rem; }

        .social-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 8px; padding: 20px; background: #fff; }
        .btn { padding: 12px; text-decoration: none; border-radius: 10px; color: #fff; font-weight: bold; font-size: 0.85rem; text-align: center; }
        .btn-yt { background: #e62117; } .btn-wa { background: #25D366; } .btn-fb { background: #1877F2; } .btn-tk { background: #000; } .btn-ig { background: linear-gradient(45deg, #f09433, #bc1888); }
    </style>
</head>
<body>

    </div>

    <div class="nav-links">
