<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kurdstan Syria Travel | حجز رحلات أربيل، سوريا، ووجهات دولية 2026</title>
    
    <meta name="description" content="المنصة الرسمية لحجز الرحلات السياحية بين كردستان وسوريا والوجهات الدولية لعام 2026. رحلات آمنة، حجز فنادق، وجولات سياحية بأفضل الأسعار.">
    <meta name="keywords" content="سفر، سياحة، كردستان، سوريا، أربيل، القامشلي، دمشق، حجز رحلات 2026، رحلات دولية، شركة سياحة">
    <meta name="author" content="Kurdstan Syria Travel">

    <meta property="og:title" content="Kurdstan Syria Travel | بوابتكم للسفر لعام 2026">
    <meta property="og:description" content="احجز رحلتك الآن بين أربيل وسوريا ومختلف الوجهات الدولية بأمان واحترافية.">
    <meta property="og:image" content="images/pic1.jpg">
    <meta property="og:type" content="website">

    <style>
        /* التنسيقات السابقة (ابقِ عليها كما هي) */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #fff; text-align: center; color: #333; overflow-x: hidden; }       
        
        .hero-wrapper { position: relative; height: 100vh; width: 100%; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #000; }
        #hero-video { position: absolute; top: 0; left: 0; width: 100%; height: 130%; object-fit: cover; z-index: 1; will-change: transform; }
        .hero-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 2; }
        .hero-text-content { position: relative; z-index: 3; color: white; text-shadow: 0 2px 15px rgba(0,0,0,0.5); }

        .identity-row { display: flex; justify-content: center; align-items: center; padding: 20px 0; gap: 20px; background: #fff; }
        .platform-title { color: #004a99; font-size: 1.1rem; font-weight: bold; line-height: 1.2; }
        .flag-box { width: 90px; height: 60px; border-radius: 4px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); border: 1px solid #eee; }
        .flag-box svg { width: 100%; height: 100%; display: block; }

        .nav-links { padding: 10px 0; }
        .nav-btn { text-decoration: none; background: #28a745; color: white; padding: 12px 35px; border-radius: 25px; font-weight: bold; display: inline-block; transition: 0.3s; }
        
        .ticker { background: #28a745; color: white; padding: 10px 0; overflow: hidden; white-space: nowrap; }
        .t-text { display: inline-block; animation: s-right 30s linear infinite; font-size: 0.9rem; }
        @keyframes s-right { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .container { padding: 50px 15px; max-width: 1200px; margin: auto; }
        .section-title { font-size: 2.2rem; color: #004a99; margin-bottom: 40px; position: relative; }
        .section-title::after { content: ''; width: 70px; height: 4px; background: #28a745; position: absolute; bottom: -12px; left: 50%; transform: translateX(-50%); }

        .destination-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; padding: 20px 0; }
        .card { position: relative; border-radius: 20px; overflow: hidden; height: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); transition: 0.5s ease; cursor: pointer; }
        .card:hover { transform: translateY(-10px) scale(1.02); }
        .card img { width: 100%; height: 100%; object-fit: cover; transition: 0.8s ease; filter: brightness(90%); }
        .card:hover img { transform: scale(1.1); filter: brightness(110%); }
        .card-overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 40px 25px; background: linear-gradient(to top, rgba(0,0,0,0.9) 10%, transparent 100%); color: white; text-align: right; }
        
        .booking-card { background: #f8f9fa; padding: 35px; border-radius: 25px; max-width: 750px; margin: 20px auto; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: right; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #444; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-family: inherit; font-size: 1rem; }
        .btn-booking { width: 100%; padding: 16px; background: #25D366; color: white; border: none; border-radius: 12px; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }

        .social-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; padding: 30px 20px; }
        .btn { padding: 14px; text-decoration: none; border-radius: 12px; color: #fff; font-weight: bold; font-size: 0.9rem; display: block; transition: 0.3s; }
        .btn-yt { background: #e62117; } .btn-wa { background: #25D366; } .btn-fb { background: #1877F2; } .btn-tk { background: #000; } .btn-ig { background: linear-gradient(45deg, #f09433, #bc1888); }

        .floating-contact { position: fixed; bottom: 30px; left: 25px; display: flex; flex-direction: column; gap: 15px; z-index: 9999; }
        .float-btn { width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 20px rgba(0,0,0,0.3); transition: 0.3s; }
        .float-btn svg { width: 30px; height: 30px; fill: white; }
        .call-btn { background-color: #004a99; } .wa-btn { background-color: #25D366; }

        @media (max-width: 768px) { .form-grid { grid-template-columns: 1fr; } .card { height: 320px; } }
    </style>
</head>
<body>

    <div class="hero-wrapper">
        <video autoplay muted loop playsinline id="hero-video"><source src="images/hero.mp4" type="video/mp4"></video>
        <div class="hero-overlay"></div>
        <div class="hero-text-content">
            <h1>شركة Kurdstan Syria Travel للسياحة 2026</h1>
            <p>خياركم الأول للسفر بين كردستان، سوريا، وكافة دول العالم</p>
        </div>
    </div>

    <script>
        // السكربتات السابقة للبارالاكس والواتساب تبقى كما هي
        window.addEventListener('scroll', function() {
            var video = document.getElementById('hero-video');
            if (window.innerWidth > 768) {
                video.style.transform = 'translateY(' + window.pageYOffset * 0.3 + 'px)';
            }
        });

        function sendToWhatsApp() {
            const name = document.getElementById('name').value;
            const from = document.getElementById('from_loc').value;
            const to = document.getElementById('to_loc').value;
            const date = document.getElementById('date').value;
            const passengers = document.getElementById('passengers').value;
            if(!name || !from || !to || !date) { alert("يرجى إكمال البيانات"); return; }
            const msg = `*طلب حجز جديد 2026*%0A*الاسم:* ${name}%0A*من:* ${from}%0A*إلى:* ${to}%0A*التاريخ:* ${date}%0A*العدد:* ${passengers}`;
            window.open(`https://wa.me/9647502061184?text=${msg}`, '_blank');
        }
    </script>
</body>
</html>
