<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kurdistan Syria Travel | الاحترافية 2026</title>
    <style>
        :root { --gold: #c1a16e; --dark: #0a0a0a; --card: #161616; --text: #f0f0f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--dark); color: var(--text); }

        /* الهيدر الفخم - التوسيط المطلق */
        .ultra-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%; background: #111; border-bottom: 2px solid var(--gold);
            box-shadow: 0 5px 20px rgba(0,0,0,0.7); position: sticky; top: 0; z-index: 1000;
        }
        .header-center { text-align: center; flex: 2; }
        .header-center h1 { font-size: 1.6rem; color: var(--gold); text-shadow: 2px 2px 5px #000; }
        .header-center p { font-size: 0.9rem; color: #28a745; font-weight: bold; }

        /* الأعلام HD 4K */
        .flag-box { width: 85px; height: 55px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5)); }

        /* الفيديو المتحرك */
        .hero { width: 100%; height: 380px; background: #000; overflow: hidden; position: relative; }
        .hero video { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }

        /* أدوات البحث والترجمة */
        .action-bar { 
            display: flex; justify-content: center; align-items: center; gap: 20px; 
            padding: 15px; background: #151515; border-bottom: 1px solid #222; flex-wrap: wrap;
        }
        .search-in { 
            background: #222; border: 1px solid var(--gold); border-radius: 25px; 
            padding: 8px 20px; color: #fff; width: 260px; outline: none;
        }

        /* المحتوى */
        .main-content { width: 92%; max-width: 1050px; margin: 35px auto; }
        .info-card { 
            background: var(--card); padding: 35px; border-radius: 20px; 
            border-right: 6px solid var(--gold); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 35px; line-height: 1.9;
        }
        .info-card h2 { color: var(--gold); margin-bottom: 15px; }

        /* معرض الصور العرضي */
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .gallery-grid img { 
            width: 100%; height: 180px; object-fit: cover; border-radius: 15px; 
            border: 2px solid #333; transition: 0.4s; cursor: pointer;
        }
        .gallery-grid img:hover { transform: translateY(-8px); border-color: var(--gold); }

        /* نافذة التكبير */
        .zoom-modal { display: none; position: fixed; z-index: 2000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; }
        .zoom-modal img { max-width: 90%; max-height: 85%; border: 3px solid var(--gold); border-radius: 12px; }
    </style>
</head>
<body>

    <header class="ultra-header">
        <div class="flag-box">
            <svg viewBox="0 0 600 400">
                <rect width="600" height="133.3" fill="#ED2024"/><rect y="133.3" width="600" height="133.3" fill="#FFFFFF"/><rect y="266.6" width="600" height="133.3" fill="#278E43"/>
                <g transform="translate(300 200)"><circle r="46" fill="#FEB117"/>
                    <script>
                        for(let i=0; i<21; i++) {
                            document.write(`<path d="M 0 -95 L 11 -46 L -11 -46 Z" fill="#FEB117" transform="rotate(${i * (360/21)})"/>`);
                        }
                    </script>
                </g>
            </svg>
        </div>

        <div class="header-center">
            <h1>Kurdistan Syria Travel</h1>
            <p>مرشد محلي معتمد Level 9</p>
        </div>

        <div class="flag-box">
            <svg viewBox="0 0 600 400">
                <rect width="600" height="133.3" fill="#007A3D"/><rect y="133.3" width="600" height="133.3" fill="#FFFFFF"/><rect y="266.6" width="600" height="133.3" fill="#000000"/>
                <g fill="#CE1126">
                    <path d="M 150 200 l 12 38 h 40 l -32 24 l 12 38 l -32 -24 l -32 24 l 12 -38 l -32 -24 h 40 z" transform="translate(-150 -245) scale(0.65)"/>
                    <path d="M 300 200 l 12 38 h 40 l -32 24 l 12 38 l -32 -24 l -32 24 l 12 -38 l -32 -24 h 40 z" transform="translate(-300 -245) scale(0.65)"/>
                    <path d="M 450 200 l 12 38 h 40 l -32 24 l 12 38 l -32 -24 l -32 24 l 12 -38 l -32 -24 h 40 z" transform="translate(-450 -245) scale(0.65)"/>
                </g>
            </svg>
        </div>
    </header>

    <div class="hero">
        <video autoplay muted loop playsinline><source src="images/hero.mp4" type="video/mp4"></video>
    </div>

    <div class="action-bar">
        <div id="google_translate_element"></div>
        <input type="text" class="search-in" placeholder="بحث عن وجهتك...">
    </div>

    <div class="main-content">
        <div class="info-card">
            <h2>أربيل: مهد التاريخ</h2>
            <p>بصفتي مرشداً محلياً معتمداً من المستوى التاسع، أصحبكم في رحلة ملكية لاستكشاف أربيل وكوردستان لعام 2026. هنا يلتقي التاريخ بالطبيعة الخلابة لنوفر لكم تجربة سياحية لا تُنسى.</p>
        </div>

        <div class="gallery-grid">
            <script>
                for(let i=1; i<=12; i++) {
                    document.write(`<img src="images/gallery${i}.jpg" onclick="zoom(this.src)" alt="Travel">`);
                }
            </script>
        </div>
    </div>

    <div id="zoomBox" class="zoom-modal" onclick="this.style.display='none'"><img id="zoomImg"></div>

    <script>
        function zoom(s) { document.getElementById('zoomBox').style.display='flex'; document.getElementById('zoomImg').src = s; }
        function googleTranslateElementInit() { new google.translate.TranslateElement({pageLanguage: 'ar'}, 'google_translate_element'); }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
