<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قناة السياحة في كردستان وسوريا</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background-color: #f8f9fa; text-align: center; }
        .header-image { width: 100%; max-height: 350px; object-fit: cover; border-bottom: 4px solid #28a745; }
        
        .hero-section { 
            display: flex; 
            justify-content: space-around; 
            align-items: center; 
            padding: 30px 10px;
            max-width: 1000px;
            margin: auto;
        }

        /* حاوية العلم المستطيل */
        .flag-box {
            width: 130px; 
            height: 85px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        /* حركة موج البحر الانسيابية من الخارج للداخل */
        .ocean-wave {
            width: 100%;
            height: 100%;
            animation: flag-wave-motion 5s ease-in-out infinite;
            transform-origin: center left;
        }

        @keyframes flag-wave-motion {
            0%, 100% { transform: perspective(600px) rotateY(0deg) scale(1); }
            25% { transform: perspective(600px) rotateY(12deg) skewY(2deg); }
            50% { transform: perspective(600px) rotateY(0deg) scale(1.04); }
            75% { transform: perspective(600px) rotateY(-12deg) skewY(-2deg); }
        }

        .flag-svg { width: 100%; height: 100%; display: block; }

        .container { padding: 25px; max-width: 900px; margin: 15px auto; background: white; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        h1 { color: #0056b3; font-size: 1.5rem; flex: 1; margin: 0 15px; }
        
        .btn-yt { display: inline-block; background: #ff0000; color: white; padding: 15px 40px; text-decoration: none; border-radius: 50px; font-weight: bold; margin-top: 30px; transition: 0.3s; }
        .btn-yt:hover { background: #cc0000; transform: translateY(-3px); }
    </style>
</head>
<body>

    <img src="images/cover.jpg" class="header-image">

    <div class="hero-section">
        <div class="flag-box">
            <div class="ocean-wave">
                <svg viewBox="0 0 6 4" class="flag-svg">
                    <rect width="6" height="1.33" fill="#007A3D"/> <rect y="1.33" width="6" height="1.33" fill="#fff"/> <rect y="2.66" width="6" height="1.34" fill="#000"/> <g fill="#CE1126">
                        <path id="star3" d="M1,2l.1.33h.33l-.27.19.1.33-.27-.2-.27.2.1-.33-.27-.19h.33Z"/>
                        <use href="#star3" x="0.5"/>
                        <use href="#star3" x="2"/>
                        <use href="#star3" x="3.5"/>
                    </g>
                </svg>
            </div>
        </div>
        
        <h1>أهلاً بكم في موقعنا السياحي</h1>
        
        <div class="flag-box">
            <div class="ocean-wave" style="animation-delay: 2.5s;">
                <svg viewBox="0 0 744 496" class="flag-svg">
                    <rect width="744" height="165" fill="#E31E26"/>
                    <rect y="165" width="744" height="166" fill="#FFF"/>
                    <rect y="331" width="744" height="165" fill="#278E43"/>
                    <g transform="translate(372,248)">
                        <circle r="60" fill="#F8E71C"/>
                        <path d="M0,-85 L10,-30 L-10,-30 Z" fill="#F8E71C" id="ray"/>
                        <g id="rays">
                            <use href="#ray" transform="rotate(17.14)"/><use href="#ray" transform="rotate(34.28)"/><use href="#ray" transform="rotate(51.42)"/><use href="#ray" transform="rotate(68.56)"/><use href="#ray" transform="rotate(85.70)"/><use href="#ray" transform="rotate(102.84)"/><use href="#ray" transform="rotate(119.98)"/><use href="#ray" transform="rotate(137.12)"/><use href="#ray" transform="rotate(154.26)"/><use href="#ray" transform="rotate(171.40)"/><use href="#ray" transform="rotate(188.54)"/><use href="#ray" transform="rotate(205.68)"/><use href="#ray" transform="rotate(222.82)"/><use href="#ray" transform="rotate(239.96)"/><use href="#ray" transform="rotate(257.10)"/><use href="#ray" transform="rotate(274.24)"/><use href="#ray" transform="rotate(291.38)"/><use href="#ray" transform="rotate(308.52)"/><use href="#ray" transform="rotate(325.66)"/><use href="#ray" transform="rotate(342.80)"/>
                        </g>
                    </g>
                </svg>
            </div>
        </div>
    </div>

    <div class="container">
        <p>استكشف سحر الطبيعة وعراقة التاريخ في سوريا وكردستان عبر رحلاتنا السياحية.</p>
        <a href="https://youtube.com/@syriatourism1980?si=3Y1e213xlnIfOS-f" class="btn-yt" target="_blank">
            اشترك في قناتنا على يوتيوب
        </a>
    </div>

</body>
</html>
