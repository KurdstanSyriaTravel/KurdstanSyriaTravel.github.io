<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kurdistan Syria Travel | الأساس الصحيح</title>
    
    <style>
        :root { --gold: #d4af37; --dark-blue: #002147; --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f9f9f9; text-align: center; }

        /* الهيدر الأبيض */
        .header-king {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%; background: var(--white);
            border-bottom: 3px solid var(--gold);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .header-title h1 { font-size: 1.5rem; color: var(--dark-blue); font-weight: 800; }
        .flag-container { width: 90px; height: 60px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15)); }

        /* شريط الأدوات */
        .tools-section { margin: 30px 0; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .search-wrapper { display: flex; gap: 10px; }
        .search-input { padding: 10px 20px; border: 1px solid #ccc; border-radius: 25px; width: 200px; outline: none; }
        .search-btn { background: var(--dark-blue); color: #fff; border: none; padding: 10px 25px; border-radius: 25px; font-weight: bold; cursor: pointer; }
        
        #google_translate_element { margin-top: 5px; }
    </style>
</head>
<body>

<header class="header-king">
    <div class="flag-container">
        <svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
            <rect width="600" height="133.3" fill="#ED2024"/> <rect y="133.3" width="600" height="133.3" fill="#FFFFFF"/> <rect y="266.6" width="600" height="133.3" fill="#278E43"/> <g transform="translate(300 200)">
                <circle r="46" fill="#FEB117"/>
                <path id="ray" d="M 0 -95 L 11 -46 L -11 -46 Z" fill="#FEB117"/>
                <script>
                    for(let i=1; i<21; i++) {
                        document.write(`<use href="#ray" transform="rotate(${i * (360/21)})"/>`);
                    }
                </script>
            </g>
        </svg>
    </div>

    <div class="header-title">
        <h1>Kurdistan Syria Travel</h1>
        <p style="color: #28a745; font-weight: bold; font-size: 0.8rem;">مرشد محلي Level 9</p>
    </div>

    <div class="flag-container">
        <svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
            <rect width="600" height="133.3" fill="#007A3D"/> <rect y="133.3" width="600" height="133.3" fill="#FFFFFF"/> <rect y="266.6" width="600" height="133.3" fill="#000000"/> <g fill="#CE1126">
                <path id="s" d="M 0 -35 L 9 -11 H 34 L 14 5 L 21 30 L 0 15 L -21 30 L -14 5 L -34 -11 H -9 Z" transform="translate(150 200) scale(0.7)"/>
                <use href="#s" transform="translate(150 0)"/>
                <use href="#s" transform="translate(300 0)"/>
            </g>
        </svg>
    </div>
</header>

<div class="tools-section">
    <div class="search-wrapper">
        <input type="text" class="search-input" placeholder="ابحث هنا...">
        <button class="search-btn">بحث</button>
    </div>
    <div id="google_translate_element"></div>
</div>

<script>
    function googleTranslateElementInit() { new google.translate.TranslateElement({pageLanguage: 'ar'}, 'google_translate_element'); }
</script>
<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
