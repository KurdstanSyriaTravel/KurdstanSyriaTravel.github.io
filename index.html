    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; background: #f8f9fa; text-align: center; overflow-x: hidden; }
        .header-img { width: 100%; max-height: 350px; object-fit: cover; border-bottom: 4px solid #28a745; }
        .hero { display: flex; justify-content: center; align-items: center; padding: 15px; max-width: 1000px; margin: auto; gap: 15px; }
        
        /* تثبيت حجم العلم ليطابق المخطط القديم */
        .f-box { width: 110px; height: 73px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); border-radius: 4px; overflow: hidden; flex-shrink: 0; }
        .wave { width: 100%; height: 100%; animation: w-act 5s ease-in-out infinite; transform-origin: center left; }
        @keyframes w-act { 0%, 100% { transform: perspective(600px) rotateY(0deg); } 50% { transform: perspective(600px) rotateY(12deg); } }
        .f-svg { width: 100%; height: 100%; display: block; object-fit: cover; }
        
        h1 { color: #0056b3; font-size: 1.6rem; margin: 0; line-height: 1.4; }
        .ticker { background: #28a745; color: white; padding: 12px 0; overflow: hidden; white-space: nowrap; width: 100%; direction: ltr; }
        .t-text { display: inline-block; animation: s-right 25s linear infinite; font-size: 1.1rem; font-weight: bold; }
        @keyframes s-right { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        .btn-yt { display: inline-block; background: #FF0000; color: #fff; padding: 14px 40px; text-decoration: none; border-radius: 50px; font-weight: bold; margin-top: 25px; transition: 0.3s; }
        .btn-yt:hover { background: #CC0000; transform: scale(1.05); }
        .gal { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin-top: 30px; padding: 0 20px; }
        .gal img { width: 100%; height: 200px; object-fit: cover; border-radius: 12px; }
    </style>
