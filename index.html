<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tourist Channel</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; background: #f8f9fa; text-align: center; overflow-x: hidden; }
        .header-image { width: 100%; max-height: 350px; object-fit: cover; border-bottom: 4px solid #28a745; }
        .hero-section { display: flex; justify-content: center; align-items: center; padding: 30px 10px; max-width: 1000px; margin: auto; gap: 20px;
        .flag-box { width: 140px; height: 93px; box-shadow: 0 8px 25px rgba(0,0,0,0.2); border-radius: 4px; overflow: hidden; position: relative; }
        .ocean-wave { width: 100%; height: 100%; animation: wave-motion 5s ease-in-out infinite; transform-origin: center left; }
        @keyframes wave-motion {
            0%, 100% { transform: perspective(600px) rotateY(0deg) scale(1); }
            25% { transform: perspective(600px) rotateY(12deg) skewY(2deg); }
            50% { transform: perspective(600px) rotateY(0deg) scale(1.04); }
            75% { transform: perspective(600px) rotateY(-12deg) skewY(-2deg); }
        .flag-svg { width: 100%; height: 100%; display: block; }
        .container { padding: 25px; max-width: 900px; margin: 15px auto; background: white; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        h1 { color: #0056b3; font-size: 1.8rem; margin: 0; flex: 1; }
        .news-ticker { background: #28a745; color: white; padding: 10px 0; overflow: hidden; white-space: nowrap; font-weight: bold; width: 100%; margin: 10px 0; }
        .ticker-text { display: inline-block; animation: scroll-left 25s linear infinite; }
        @keyframes scroll-left { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin-top: 25px; }
        .gallery-item { overflow: hidden; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); height: 200px; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: 0.3s; }
        .gallery-item:hover img { transform: scale(1.05); }

        .btn-yt { display: inline-block; background: #ff0000; color: white; padding: 15px 40px; text-decoration: none; border-radius: 50px; font-weight: bold; margin-top: 30px; transition: 0.3s; font-size: 1.1rem; }
        .btn-yt:hover { background: #cc0000; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(255,0,0,0.3); }
    </style>
</head>
<body>

    <img src="images/cover.jpg" class="header-image">

    <div class="hero-section">
        <div class="flag-box">
            <div class="ocean-wave">
                <svg viewBox="0 0 3 2" class="flag-svg">
                    <rect width="3" height="0.666" fill="#007A3D"/>
                    <rect y="0.666" width="3" height="0.666" fill="#fff"/>
                    <rect y="1.332" width="3" height="0.668" fill="#000"/>
                    <g fill="#CE1126">
                        <path id="s3" d="M1,0.95l.05.15h.16l-.13.09.05.15-.13-.09-.13.09.05-.15-.13-.09h.16Z" transform="translate(-0.1, 0.05)"/>
                        <use href="#s3" x="0.7"/><use href="#s3" x="1.4"/>
                    </g>
                </svg>
            </div>
        </div>

        <h1>أهلاً بكم في موقعنا السياحي</h1>

        <div class="flag-box">
            <div class="ocean-wave" style="animation-delay: 2.5s;">
                <svg viewBox="0 0 744 496" class="flag-svg">
                    <rect width="744" height="165" fill="#E31E26"/><rect y="165" width="744" height="166" fill="#FFF"/><rect y="331" width="744" height="165" fill="#278E43"/>
                    <g transform="translate(372,248)"><circle r="60" fill="#F8E71C"/><path d="M0,-85 L10,-30 L-10,-30 Z" fill="#F8E71C" id="r"/>
                        <use href="#r" transform="rotate(17)"/><use href="#r" transform="rotate(34)"/><use href="#r" transform="rotate(51)"/><use href="#r" transform="rotate(68)"/><use href="#r" transform="rotate(85)"/><use href="#r" transform="rotate(102)"/><use href="#r" transform="rotate(119)"/><use href="#r" transform="rotate(136)"/><use href="#r" transform="rotate(153)"/><use href="#r" transform="rotate(170)"/><use href="#r" transform="rotate(187)"/><use href="#r" transform="rotate(204)"/><use href="#r" transform="rotate(221)"/><use href="#r" transform="rotate(238)"/><use href="#r" transform="rotate(255)"/><use href="#r" transform="rotate(272)"/><use href="#r" transform="rotate(289)"/><use href="#r" transform="rotate(306)"/><use href="#r" transform="rotate(323)"/><use href="#r" transform="rotate(340)"/></g>
                </svg>
            </div>
        </div>
    </div>

    <div class="news-ticker">
        <div class="ticker-text">
            عدد زوار إقليم كردستان في 2023 تجاوز 7 ملايين زائر • توقعات بوصول العدد إلى 10 ملايين في 2025 • نمو السياحة بنسبة 25% سنوياً • أهلاً بكم في جنة الشرق • 
        </div>
    </div>

    <div class="container">
        <p>اكتشف سحر الطبيعة وعراقة التاريخ في رحلاتنا السياحية المميزة.</p>
        
        <div class="gallery">
            <div class="gallery-item"><img src="images/pic1.jpg" alt="Nature"></div>
            <div class="gallery-item"><img src="images/pic2.jpg" alt="History"></div>
            <div class="gallery-item"><img src="images/pic3.jpg" alt="Trips"></div>
        </div>

        <a href="https://youtube.com/@syriatourism1980?si=3Y1e213xlnIfOS-f" class="btn-yt" target="_blank">اشترك في قناتنا على يوتيوب</a>
