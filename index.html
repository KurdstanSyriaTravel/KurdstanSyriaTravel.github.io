<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قناة السياحة في كردستان وسوريا</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background-color: #f8f9fa; text-align: center; }
        .header-image { width: 100%; max-height: 350px; object-fit: cover; border-bottom: 4px solid #28a745; }
        
        .hero-section { 
            display: flex; 
            justify-content: space-around; 
            align-items: center; 
            padding: 25px 10px;
            max-width: 1000px;
            margin: auto;
        }

        /* حاوية العلم المستطيل */
        .flag-box {
            width: 140px; 
            height: 90px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
            background: white;
        }

        /* تأثير موج البحر (الرفرفة من الخارج للداخل) */
        .wave-motion {
            width: 100%;
            height: 100%;
            animation: ocean-wave 5s ease-in-out infinite;
            transform-origin: right center; /* لجعل الحركة تبدأ من الطرف */
        }

        @keyframes ocean-wave {
            0%, 100% { transform: perspective(500px) rotateY(0deg) scale(1); }
            25% { transform: perspective(500px) rotateY(10deg) skewY(2deg); }
            50% { transform: perspective(500px) rotateY(0deg) scale(1.05); }
            75% { transform: perspective(500px) rotateY(-10deg) skewY(-2deg); }
        }

        .flag-svg { width: 100%; height: 100%; display: block; }

        .container { padding: 25px; max-width: 900px; margin: 15px auto; background: white; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        h1 { color: #0056b3; font-size: 1.5rem; flex: 1; margin: 0 15px; }
        
        .btn-yt { display: inline-block; background: #ff0000; color: white; padding: 15px 40px; text-decoration: none; border-radius: 50px; font-weight: bold; margin-top: 30px; transition: 0.3s; }
        .btn-yt:hover { background: #cc0000; transform: translateY(-3px); }
    </style>
</head>
<body>

    <img src="images/cover.jpg" class="header-image">

    <div class="hero-section">
        <div class="flag-box">
            <div class="wave-motion">
                <svg viewBox="0 0 6 4" class="flag-svg">
                    <rect width="6" height="1.33" fill="#007A3D"/>
                    <rect y="1.33" width="6" height="1.33" fill="#fff"/>
                    <rect y="2.66" width="6" height="1.34" fill="#000"/>
                    <g fill="#CE1126">
                        <path id="star3" d="M1.2,2l.1.33h.33l-.27.19.1.33-.27-.2-.27.2.1-.33-.27-.19h.33Z"/>
                        <use href="#star3" x="0.3"/>
                        <use href="#star3" x="1.8"/>
                        <use href="#star3" x="3.3"/>
                    </g>
                </svg>
            </div>
        </div>
        
        <h1>أهلاً بكم في موقعنا السياحي</h1>
        
        <div class="flag-box">
            <div class="wave-motion" style="animation-delay: 2.5s;">
                <svg viewBox="0 0 744 496" class="flag-svg">
                    <rect width="744" height="165" fill="#E31E26"/>
                    <rect y="165" width="744" height="166" fill="#FFF"/>
                    <rect y="331" width="744" height="165" fill="#278E43"/>
                    <g transform="translate(372,248)">
                        <circle r="60" fill="#F8E71C"/>
                        <path d="M0,-85 L10,-30 L-10,-30 Z" fill="#F8E71C" id="ray"/>
                        <script>
                            // إضافة أشعة الشمس برمجياً لضمان الدقة
                            const g = document.currentScript.parentElement;
                            for(let i=1; i<21; i++) {
                                let use = document.createElementNS("http://www.w3.org/2000/svg", "use");
                                use.setAttributeNS("http://www.w3.org/2000/svg", "href", "#ray");
                                use.setAttribute("transform", `rotate(${i*17.14})`);
                                g.appendChild(use);
                            }
                        </script>
                    </g>
                </svg>
            </div>
        </div>
    </div>

    <div class="container">
        <p>استكشف أجمل المناطق الطبيعية والمعالم السياحية في كردستان وسوريا.</p>
        <a href="https://youtube.com/@syriatourism1980?si=3Y1e213xlnIfOS-f" class="btn-yt" target="_blank">
            اشترك في قناتنا على يوتيوب
        </a>
    </div>

</body>
</html>
