<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kurdistan Syria Travel | محمد الكردي</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f7f6; color: #333; }

        /* الهيدر والأعلام */
        .main-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: white; border-bottom: 1px solid #eee; }
        .header-title h1 { color: #004a99; font-size: 1.4rem; text-align: center; }
        .header-title p { color: #28a745; font-weight: bold; font-size: 0.85rem; text-align: center; }

        /* تصميم علم كوردستان بالـ CSS الذي أحضرته مع ضبط 21 شعاعاً */
        .flag-css { width: 65px; height: 42px; position: relative; border: 0.5px solid #ddd; overflow: hidden; }
        .stripe { height: 33.33%; width: 100%; }
        .red { background: #e70013; }
        .white { background: #fff; }
        .green { background: #009639; }
        .sun-css { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 14px; height: 14px; background: #fcd116; border-radius: 50%; z-index: 2;
        }
        .ray-css { 
            position: absolute; top: 50%; left: 50%; width: 22px; height: 1.5px; 
            background: #fcd116; transform-origin: center; z-index: 1;
        }

        /* علم الثورة السورية */
        .syria-flag { width: 65px; height: 42px; display: flex; flex-direction: column; border: 0.5px solid #ddd; }
        .sy-s { height: 33.33%; width: 100%; position: relative; }
        .stars-row { position: absolute; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; gap: 2px; }
        .star { color: red; font-size: 8px; }

        /* الفيديو المتحرك (Hero) */
        .hero-video { width: 100%; height: 320px; background: #000; overflow: hidden; position: relative; }
        .hero-video video { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }

        /* أزرار البحث والترجمة تحت الفيديو */
        .tools-bar { display: flex; justify-content: center; align-items: center; gap: 15px; padding: 15px; background: white; border-bottom: 2px solid #eee; flex-wrap: wrap; }
        .search-box { background: #f1f1f1; border: 1px solid #ccc; padding: 6px 15px; border-radius: 20px; display: flex; align-items: center; }
        .search-box input { border: none; background: none; outline: none; font-size: 0.9rem; width: 160px; }

        /* المحتوى */
        .container { width: 92%; max-width: 1000px; margin: 25px auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .content-h2 { color: #004a99; border-right: 5px solid #28a745; padding-right: 12px; margin-bottom: 15px; }
        .description { text-align: justify; line-height: 1.8; margin-bottom: 25px; padding: 0 10px; }

        /* معرض الصور العرضي */
        .gallery { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        .gallery img { width: calc(33.33% - 10px); height: 130px; object-fit: cover; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        .gallery img:hover { transform: scale(1.05); }

        @media (max-width: 600px) { .gallery img { width: calc(50% - 10px); } .hero-video { height: 220px; } }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="syria-flag">
            <div class="sy-s" style="background:#007A3D"></div>
            <div class="sy-s" style="background:#fff">
                <div class="stars-row">
                    <span class="star">★</span><span class="star">★</span><span class="star">★</span>
                </div>
            </div>
            <div class="sy-s" style="background:#000"></div>
        </div>

        <div class="header-title">
            <h1>Kurdistan Syria Travel</h1>
            <p>مرشد محلي معتمد Level 9</p>
        </div>

        <div class="flag-css">
            <div class="stripe red"></div>
            <div class="stripe white"></div>
            <div class="stripe green"></div>
            <div class="sun-css"></div>
            <script>
                // توليد 21 شعاعاً بدقة بناءً على فكرتك
                for (let i = 0; i < 21; i++) {
                    document.write(`<div class="ray-css" style="transform: translate(-50%, -50%) rotate(${i * (360 / 21)}deg)"></div>`);
                }
            </script>
        </div>
    </header>

    <div class="hero-video">
        <video autoplay muted loop playsinline><source src="images/hero.mp4" type="video/mp4"></video>
    </div>

    <div class="tools-bar">
        <div id="google_translate_element"></div>
        <div class="search-box">
            <input type="text" placeholder="ابحث في الموقع...">
            <span>🔍</span>
        </div>
    </div>

    <div class="container">
        <h2 class="content-h2">أربيل: حكاية التاريخ</h2>
        <div class="description">
            بصفتي مرشداً محلياً (Level 9)، أدعوكم لاكتشاف سحر كوردستان لعام 2026. من قلعة أربيل التاريخية إلى الطبيعة الجبلية الخلابة، نحن هنا لنقدم لكم تجربة سياحية لا تُنسى تجمع بين الأصالة والحداثة.
        </div>

        <div class="gallery">
            <script>
                for(let i=1; i<=12; i++) {
                    document.write(`<img src="images/gallery${i}.jpg" onclick="alert('سيتم تكبير الصورة قريباً')">`);
                }
            </script>
        </div>
    </div>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'ar'}, 'google_translate_element');
        }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
