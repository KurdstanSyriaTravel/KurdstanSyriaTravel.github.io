<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قناة السياحة في كردستان وسوريا</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background-color: #f8f9fa; text-align: center; }
        .header-image { width: 100%; max-height: 350px; object-fit: cover; border-bottom: 4px solid #28a745; }
        
        .hero-section { 
            display: flex; 
            justify-content: space-around; 
            align-items: center; 
            padding: 30px 10px;
            max-width: 1000px;
            margin: auto;
        }

        /* العلم المستطيل الخفاق */
        .flag-container {
            width: 130px; 
            height: 85px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            border-radius: 4px;
            overflow: hidden;
            animation: flag-wave 5s ease-in-out infinite;
        }

        @keyframes flag-wave {
            0%, 100% { transform: scale(1) rotate(0deg) translateY(0); }
            50% { transform: scale(1.03) rotate(2deg) translateY(-8px); }
        }

        .container { padding: 25px; max-width: 900px; margin: 15px auto; background: white; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.05); }
        h1 { color: #0056b3; font-size: 1.6rem; flex: 1; margin: 0 15px; }

        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; margin-top: 30px; }
        .gallery-item { overflow: hidden; border-radius: 12px; box-shadow: 0 6px 12px rgba(0,0,0,0.1); background: #eee; height: 220px; position: relative; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: 0.3s; }
        .gallery-item span { position: absolute; bottom: 0; background: rgba(0,0,0,0.7); color: white; width: 100%; padding: 8px 0; font-weight: bold; }

        .btn-yt { display: inline-block; background: #ff0000; color: white; padding: 15px 40px; text-decoration: none; border-radius: 50px; font-weight: bold; font-size: 1.2rem; margin-top: 30px; transition: 0.3s; }
    </style>
</head>
<body>

    <img src="images/cover.jpg" class="header-image">

    <div class="hero-section">
        <div class="flag-container">
            <svg viewBox="0 0 3 2">
                <rect width="3" height="2" fill="#000"/>
                <rect width="3" height="1.333" fill="#fff"/>
                <rect width="3" height="0.666" fill="#007A3D"/>
                <g fill="#CE1126">
                    <path id="star3" d="M0.5,1l.05.15h.16l-.13.09.05.15-.13-.09-.13.09.05-.15-.13-.09h.16Z"/>
                    <use href="#star3" x="0.5"/>
                    <use href="#star3" x="1"/>
                    <use href="#star3" x="1.5"/>
                </g>
            </svg>
        </div>
        
        <h1>أهلاً بكم في موقعنا السياحي</h1>
        
        <div class="flag-container" style="animation-delay: 2.5s;">
            <svg viewBox="0 0 744 496">
                <rect width="744" height="165" fill="#E31E26"/>
                <rect y="165" width="744" height="166" fill="#FFF"/>
                <rect y="331" width="744" height="165" fill="#278E43"/>
                <g transform="translate(372,248)">
                    <circle r="60" fill="#F8E71C"/>
                    <path d="M0,-85 L10,-30 L-10,-30 Z" fill="#F8E71C" id="ray"/>
                    <use href="#ray" transform="rotate(17)"/><use href="#ray" transform="rotate(34)"/><use href="#ray" transform="rotate(51)"/><use href="#ray" transform="rotate(68)"/><use href="#ray" transform="rotate(85)"/><use href="#ray" transform="rotate(102)"/><use href="#ray" transform="rotate(119)"/><use href="#ray" transform="rotate(136)"/><use href="#ray" transform="rotate(153)"/><use href="#ray" transform="rotate(170)"/><use href="#ray" transform="rotate(187)"/><use href="#ray" transform="rotate(204)"/><use href="#ray" transform="rotate(221)"/><use href="#ray" transform="rotate(238)"/><use href="#ray" transform="rotate(255)"/><use href="#ray" transform="rotate(272)"/><use href="#ray" transform="rotate(289)"/><use href="#ray" transform="rotate(306)"/><use href="#ray" transform="rotate(323)"/><use href="#ray" transform="rotate(340)"/>
                </g>
            </svg>
        </div>
    </div>

    <div class="container">
        <div class="gallery">
            <div class="gallery-item"><img src="images/pic1.jpg"><span>سحر الطبيعة</span></div>
            <div class="gallery-item"><img src="images/pic2.jpg"><span>عبق التاريخ</span></div>
            <div class="gallery-item"><img src="images/pic3.jpg"><span>رحلاتنا السياحية</span></div>
        </div>

        <a href="https://youtube.com/@syriatourism1980?si=3Y1e213xlnIfOS-f" class="btn-yt" target="_blank">
            اشترك في قناتنا على يوتيوب
        </a>
    </div>

</body>
</html>
