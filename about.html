<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kurdstan Syria Travel</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 0; background: #fff; text-align: center; color: #333; overflow-x: hidden; }       
        .hero-wrapper { position: relative; height: 100vh; width: 100%; overflow: hidden; display: flex; align-items: center; justify-content: center; color: white; background: #000; }
        #hero-video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; object-fit: cover; }
        .hero-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.1); z-index: 2; }
        .hero-text-content { position: relative; z-index: 3; max-width: 80%; }
        
        .identity-row { display: grid; grid-template-columns: auto auto auto; align-items: center; justify-content: center; padding: 15px 10px; gap: 15px; background: #fff; margin: 0; border: none; position: relative; z-index: 5; }
        .platform-title { color: #004a99; font-size: 1.1rem; margin: 0; font-weight: bold; line-height: 1.2; }
        
        @keyframes flagFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        .flag-box { width: 80px; height: 55px; border-radius: 6px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.1); animation: flagFloat 5s ease-in-out infinite; transition: 0.3s; }
        .flag-box:hover { transform: scale(1.1); animation-play-state: paused; }
        .flag-box svg { width: 100%; height: 100%; display: block; }
        
        .nav-links { margin: 15px 0; }
        .nav-btn { text-decoration: none; background: #28a745; color: white; padding: 10px 30px; border-radius: 25px; font-weight: bold; transition: 0.3s; display: inline-block; font-size: 0.95rem; }
        .nav-btn:hover { background: #1a742c; transform: translateY(-2px); }
        
        .ticker { background: #28a745; color: white; padding: 10px 0; overflow: hidden; white-space: nowrap; margin-top: 15px; }
        .t-text { display: inline-block; animation: s-right 25s linear infinite; font-size: 0.9rem; }
        @keyframes s-right { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        
        .container { padding: 25px 15px; max-width: 100%; margin: auto; }
        .destination-grid { display: flex; flex-direction: column; gap: 15px; }
        .card { border-radius: 20px; overflow: hidden; height: auto; min-height: 250px; position: relative; background: #fff; box-shadow: none; border: none; }
        .card img { width: 100%; height: auto; object-fit: cover; display: block; filter: brightness(100%) !important; }
        .card-info { position: absolute; bottom: 15px; left: 0; right: 0; width: 100%; background: none; color: #fff; padding: 0 15px; box-sizing: border-box; text-align: center; }
        .card-info h3 { margin: 0; font-size: 1.2rem; font-weight: bold; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <div class="hero-wrapper">
        <video autoplay muted loop playsinline id="hero-video">
            <source src="images/hero.mp4" type="video/mp4">
        </video>
        <div class="hero-overlay"></div>
        <div class="hero-text-content">
            <h1>استكشف آفاق الجمال الطبيعي</h1>
            <p>بوابتكم لاكتشاف كنوز كردستان وسوريا لعام 2026</p>
        </div>
    </div>
    <div class="identity-row">
        <div class="flag-box">
            <svg viewBox="0 0 744 496">
                <rect width="744" height="165" fill="#E31E26"/><rect y="165" width="744" height="166" fill="#FFF"/><rect y="331" width="744" height="165" fill="#278E43"/>
                <g transform="translate(372,248)"><circle r="65" fill="#F8E71C"/><path d="M0,-85 L10,-30 L-10,-30 Z" fill="#F8E71C"/></g>
            </svg>
        </div>
        <div class="platform-title">المنصة السياحية<br>الرسمية</div>
        <div class="flag-box">
            <svg viewBox="0 0 600 400">
                <rect width="600" height="133.3" fill="#1a742c"/><rect y="133.3" width="600" height="133.4" fill="#FFF"/><rect y="266.7" width="600" height="133.3" fill="#000"/>
                <g fill="#CE1126" transform="translate(120, 200)"><path id="star" d="M0,-25 L7, -8 L25, -8 L11, 4 L16, 22 L0, 12 L-16, 22 L-11, 4 L-25, -8 L-7, -8 Z"/><use href="#star" x="180"/><use href="#star" x="360"/></g>
            </svg>
        </div>
    </div>
    <div class="nav-links"><a href="about.html" class="nav-btn">تعرف علينا (من نحن) ←</a></div>
    <div class="ticker"><div class="t-text">رؤية 2026: طفرة سياحية كبرى في المنطقة • حجز فنادق وجولات سياحية • رحلاتنا مستمرة معكم •</div></div>
    <div class="container">
        <div class="destination-grid">
            <div class="card"><img src="images/pic1.jpg"><div class="card-info"><h3>سحر الطبيعة</h3></div></div>
            <div class="card"><img src="images/pic2.jpg"><div class="card-info"><h3>إرث وتاريخ</h3></div></div>
        </div>
    </div>
</body>
</html>
